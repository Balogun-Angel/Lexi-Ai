services:
  db:
    image: pgvector/pgvector:pg16
    container_name: lexiai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexiai
      POSTGRES_PASSWORD: lexiai
      POSTGRES_DB: lexiai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexiai -d lexiai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
